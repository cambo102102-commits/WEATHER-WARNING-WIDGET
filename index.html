<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>National Weather Alert Banner</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111;
    font-family:Arial,Helvetica,sans-serif;
}

/* MAIN ALERT BANNER */

#alertBanner{
    width:100%;
    min-height:120px;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:15px;
    transition:all .5s ease;
    color:white;
    position:relative;
}

.banner-content{
    width:100%;
    max-width:1400px;
    padding:0 55px;
}

.alert-title{
    font-size:clamp(22px,4vw,42px);
    font-weight:900;
    text-transform:uppercase;
    letter-spacing:1px;
}

.alert-count{
    margin-top:5px;
    font-size:clamp(12px,1.5vw,18px);
    font-weight:bold;
}

.alert-area{
    margin-top:8px;
    font-size:clamp(13px,1.7vw,20px);
}

.alert-time{
    margin-top:6px;
    font-size:clamp(11px,1.2vw,16px);
    opacity:.95;
}

/* COLORS WITH TRANSPARENCY */

.gray{
    background:rgba(85,85,85,.78);
}

.tornado{
    background:rgba(192,0,0,.82);
    animation:pulseRed 1.4s infinite;
}

.severe{
    background:rgba(255,212,0,.82);
    color:black;
}

.flood{
    background:rgba(0,140,69,.82);
}

.hurricane{
    background:rgba(106,0,255,.82);
}

.winter{
    background:rgba(0,119,255,.82);
}

.heat{
    background:rgba(255,102,0,.82);
}

.other{
    background:rgba(68,68,170,.82);
}

@keyframes pulseRed{
    0%{
        box-shadow:0 0 10px #ff0000;
    }

    50%{
        box-shadow:0 0 40px #ff0000;
    }

    100%{
        box-shadow:0 0 10px #ff0000;
    }
}

/* MANUAL BUTTONS */

.alert-btn{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    width:42px;
    height:42px;
    border:none;
    border-radius:50%;
    background:rgba(0,0,0,.35);
    color:white;
    font-size:26px;
    font-weight:bold;
    cursor:pointer;
    transition:.25s ease;
    z-index:10;
}

.alert-btn:hover{
    background:rgba(0,0,0,.65);
}

#prevAlert{
    left:12px;
}

#nextAlert{
    right:12px;
}

/* MOBILE */

@media(max-width:768px){

    #alertBanner{
        min-height:95px;
        padding:10px;
    }

    .banner-content{
        padding:0 42px;
    }

    .alert-area{
        display:none;
    }

    .alert-btn{
        width:34px;
        height:34px;
        font-size:22px;
    }

}

</style>
</head>

<body>

<div id="alertBanner" class="gray">

    <button id="prevAlert" class="alert-btn">‹</button>

    <div class="banner-content">

        <div class="alert-title">
            Loading Active Alerts...
        </div>

        <div class="alert-count"></div>

        <div class="alert-area"></div>

        <div class="alert-time"></div>

    </div>

    <button id="nextAlert" class="alert-btn">›</button>

</div>

<script>

const ALERT_API =
'https://api.weather.gov/alerts/active';

let alerts = [];
let currentAlert = 0;

const banner =
document.getElementById('alertBanner');

const title =
document.querySelector('.alert-title');

const count =
document.querySelector('.alert-count');

const area =
document.querySelector('.alert-area');

const time =
document.querySelector('.alert-time');

const prevButton =
document.getElementById('prevAlert');

const nextButton =
document.getElementById('nextAlert');

const PRIORITY = {

"Tornado Emergency":100,
"Tornado Warning":95,

"Flash Flood Emergency":90,
"Flash Flood Warning":85,

"Severe Thunderstorm Warning":80,

"Hurricane Warning":75,
"Hurricane Watch":70,

"Blizzard Warning":65,
"Ice Storm Warning":60

};

function getAlertClass(event){

event = event.toLowerCase();

if(event.includes('tornado'))
return 'tornado';

if(event.includes('severe thunderstorm'))
return 'severe';

if(
event.includes('flood') ||
event.includes('flash flood')
)
return 'flood';

if(
event.includes('hurricane') ||
event.includes('tropical storm')
)
return 'hurricane';

if(
event.includes('winter') ||
event.includes('snow') ||
event.includes('ice') ||
event.includes('blizzard')
)
return 'winter';

if(event.includes('heat'))
return 'heat';

return 'other';

}

function displayAlert(alert){

const props =
alert.properties;

banner.className =
getAlertClass(props.event);

title.textContent =
props.event;

count.textContent =
`${currentAlert + 1} of ${alerts.length.toLocaleString()} Active NWS Alerts Nationwide`;

area.textContent =
props.areaDesc || '';

time.textContent =
props.expires
?
`Expires: ${new Date(props.expires).toLocaleString()}`
:
'';

}

function showNoAlerts(){

banner.className =
'gray';

title.textContent =
'NO ACTIVE ALERTS AT THIS TIME';

count.textContent =
'';

area.textContent =
'';

time.textContent =
'';

prevButton.style.display =
'none';

nextButton.style.display =
'none';

}

async function loadAlerts(){

try{

const response =
await fetch(ALERT_API,{
headers:{
'Accept':'application/geo+json'
}
});

const data =
await response.json();

alerts =
data.features || [];

if(alerts.length===0){

showNoAlerts();
return;

}

alerts.sort((a,b)=>{

const aPriority =
PRIORITY[a.properties.event] || 10;

const bPriority =
PRIORITY[b.properties.event] || 10;

return bPriority-aPriority;

});

currentAlert = 0;

prevButton.style.display =
'block';

nextButton.style.display =
'block';

displayAlert(
alerts[currentAlert]
);

}
catch(error){

console.error(error);

showNoAlerts();

}

}

function nextAlert(){

if(alerts.length > 1){

currentAlert++;

if(currentAlert >= alerts.length){
currentAlert = 0;
}

displayAlert(
alerts[currentAlert]
);

}

}

function previousAlert(){

if(alerts.length > 1){

currentAlert--;

if(currentAlert < 0){
currentAlert = alerts.length - 1;
}

displayAlert(
alerts[currentAlert]
);

}

}

nextButton.addEventListener(
'click',
nextAlert
);

prevButton.addEventListener(
'click',
previousAlert
);

setInterval(
nextAlert,
10000
);

loadAlerts();

setInterval(
loadAlerts,
60000
);

</script>

</body>
</html>
